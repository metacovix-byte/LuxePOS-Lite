name: Build Android APK

# Déclenché sur tag v* ou manuellement.
# Produit un APK debug (non signé, installable via "Sources inconnues" sur Android).
# Pour APK signé Play Store : ajouter keystore en secrets + utiliser :release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Pour uploader l'APK sur la release GitHub
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup JDK 21 (requis par capacitor.build.gradle JavaVersion.VERSION_21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platforms + build-tools (API 36)
        run: |
          # Le setup-android installe cmdline-tools mais pas forcément l'API 36
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0"
          sdkmanager --list | grep -i "Installed" | head -20

      - name: Install npm deps
        run: npm ci || npm install

      - name: Verify Capacitor Android plugin exists
        run: |
          if [ -d "node_modules/@capacitor/android/capacitor" ]; then
            echo "✅ @capacitor/android found"
          else
            echo "❌ @capacitor/android NOT found"
            npm ls @capacitor/android || true
            exit 1
          fi

      - name: Sync HTML to dist-web + Android assets
        shell: bash
        run: |
          cp luxepos-lite.html dist-web/luxepos-lite.html
          cp luxepos-lite.html dist-web/index.html
          # Copie aussi vers les assets Android (Capacitor sync)
          mkdir -p android/app/src/main/assets/public
          cp luxepos-lite.html android/app/src/main/assets/public/luxepos-lite.html
          cp luxepos-lite.html android/app/src/main/assets/public/index.html

      - name: Sync Capacitor
        run: |
          npx cap sync android 2>&1 || echo "⚠ cap sync failed, trying build anyway..."

      - name: Build APK (debug, non signé)
        working-directory: android
        run: |
          # Safety net : restaure le flag +x sur gradlew
          chmod +x gradlew
          # Accepter les licences SDK automatiquement
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          # Build debug APK
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK avec version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          DST="LuxePOS-Lite-${VERSION}-android.apk"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$DST"
            ls -lh "$DST"
            echo "APK_PATH=$DST" >> $GITHUB_ENV
          else
            echo "::error::APK introuvable à $SRC"
            find android/app/build -name "*.apk" 2>/dev/null || true
            exit 1
          fi

      - name: Upload APK à la release GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          tag_name: ${{ github.ref_name }}
          # Ne crée PAS de release si elle n'existe pas — on attend que release.yml l'ait créée
          fail_on_unmatched_files: false
          generate_release_notes: false

      - name: Upload APK comme artifact (toujours, même sans tag)
        uses: actions/upload-artifact@v4
        with:
          name: LuxePOS-Lite-android
          path: ${{ env.APK_PATH }}
          retention-days: 30
